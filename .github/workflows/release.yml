name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            asset_name: agam-linux-x86_64.tar.gz
          - os: macos-latest
            target: macos
            asset_name: agam-macos-aarch64.tar.gz
          - os: windows-latest
            target: windows
            asset_name: agam-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm-18-dev libllvm18 build-essential
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "LLVM_DIR=$(llvm-config-18 --cmakedir)" >> $GITHUB_ENV

      - name: Install Dependencies (macOS)
        if: matrix.target == 'macos'
        run: |
          brew install cmake llvm@18 zstd zlib
          echo "/opt/homebrew/opt/llvm@18/bin" >> $GITHUB_PATH
          echo "LLVM_DIR=/opt/homebrew/opt/llvm@18/lib/cmake/llvm" >> $GITHUB_ENV
          echo "LDFLAGS=-L/opt/homebrew/opt/zstd/lib -L/opt/homebrew/opt/zlib/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/opt/zstd/include -I/opt/homebrew/opt/zlib/include" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: matrix.target == 'windows'
        run: |
          choco install llvm --version=18.1.8 -y --allow-downgrade
          echo "LLVM_DIR=C:/Program Files/LLVM/lib/cmake/llvm" >> $env:GITHUB_ENV
          echo "C:/Program Files/LLVM/bin" >> $env:GITHUB_PATH

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DAGAM_BUILD_TESTS=OFF -DCMAKE_PREFIX_PATH="C:/Program Files/LLVM" -DLLVM_DIR="C:/Program Files/LLVM/lib/cmake/llvm"

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Unix)
        if: matrix.target != 'windows'
        run: |
          mkdir -p release_pack/std
          cp build/bin/agamc release_pack/
          cp -r std/* release_pack/std/
          cp README.md LICENSE release_pack/ || true
          cd release_pack && tar -czvf ../${{ matrix.asset_name }} *

      - name: Package (Windows)
        if: matrix.target == 'windows'
        run: |
          mkdir release_pack\std
          copy build\bin\Release\agamc.exe release_pack\
          xcopy std release_pack\std /E /I /K /Y
          if (Test-Path README.md) { copy README.md release_pack\ }
          if (Test-Path LICENSE) { copy LICENSE release_pack\ }
          Compress-Archive -Path release_pack\* -DestinationPath ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true