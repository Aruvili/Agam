name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: linux
            asset_name: agam-linux-x86_64.tar.gz
          - os: macos-latest
            arch: aarch64
            target: macos
            asset_name: agam-macos-aarch64.tar.gz
          - os: windows-latest
            arch: x86_64
            target: windows
            asset_name: agam-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm-17-dev libllvm17 build-essential
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install Dependencies (macOS)
        if: matrix.target == 'macos'
        run: |
          brew install cmake llvm@17
          echo 'export PATH="/opt/homebrew/opt/llvm@17/bin:$PATH"' >> ~/.bash_profile
          # Force CMake to see Homebrew LLVM
          echo "LLVM_DIR=/opt/homebrew/opt/llvm@17/lib/cmake/llvm" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: matrix.target == 'windows'
        run: |
          choco install llvm --version=17.0.6 -y

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAGAM_BUILD_TESTS=OFF

      - name: Build Agam
        run: cmake --build build --config Release

      - name: Create Release Package (Unix)
        if: matrix.target != 'windows'
        run: |
          mkdir -p release_pack/std
          cp build/bin/agamc release_pack/
          cp -r std/* release_pack/std/
          cp README.md LICENSE release_pack/ || true
          cd release_pack && tar -czvf ../${{ matrix.asset_name }} *

      - name: Create Release Package (Windows)
        if: matrix.target == 'windows'
        run: |
          mkdir release_pack\std
          copy build\bin\Release\agamc.exe release_pack\
          xcopy std release_pack\std /E /I /K /Y
          copy README.md release_pack\
          copy LICENSE release_pack\
          Compress-Archive -Path release_pack\* -DestinationPath ${{ matrix.asset_name }}

      - name: Release Note
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
