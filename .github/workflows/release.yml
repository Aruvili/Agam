name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            asset_name: agam-linux-x86_64.tar.gz
          - os: macos-latest
            target: macos
            asset_name: agam-macos-aarch64.tar.gz
          - os: windows-latest
            target: windows
            asset_name: agam-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake llvm-18-dev libllvm18 build-essential
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "LLVM_DIR=$(llvm-config-18 --cmakedir)" >> $GITHUB_ENV

      - name: Install Dependencies (macOS)
        if: matrix.target == 'macos'
        run: |
          brew install cmake llvm@18 zstd zlib ncurses
          echo "/opt/homebrew/opt/llvm@18/bin" >> $GITHUB_PATH
          echo "LLVM_DIR=/opt/homebrew/opt/llvm@18/lib/cmake/llvm" >> $GITHUB_ENV
          echo "LDFLAGS=-L/opt/homebrew/opt/zstd/lib -L/opt/homebrew/opt/zlib/lib -L/opt/homebrew/opt/ncurses/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/opt/zstd/include -I/opt/homebrew/opt/zlib/include -I/opt/homebrew/opt/ncurses/include" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: matrix.target == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-flex
            mingw-w64-ucrt-x86_64-bison
            mingw-w64-ucrt-x86_64-zip

      - name: Configure CMake (Unix)
        if: matrix.target != 'windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAGAM_BUILD_TESTS=OFF -DLLVM_DIR="${{ env.LLVM_DIR }}"

      - name: Configure CMake (Windows)
        if: matrix.target == 'windows'
        shell: msys2 {0}
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DAGAM_BUILD_TESTS=OFF

      - name: Build (Unix)
        if: matrix.target != 'windows'
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: matrix.target == 'windows'
        shell: msys2 {0}
        run: cmake --build build

      - name: Package (Unix)
        if: matrix.target != 'windows'
        run: |
          mkdir -p release_pack/std
          cp build/bin/agamc release_pack/
          cp -r std/* release_pack/std/
          cp README.md LICENSE release_pack/ || true
          cd release_pack && tar -czvf ../${{ matrix.asset_name }} *

      - name: Package (Windows)
        if: matrix.target == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p release_pack/std
          cp build/bin/agamc.exe release_pack/
          cp -r std/* release_pack/std/
          cp README.md LICENSE release_pack/ || true
          cd release_pack && zip -r ../${{ matrix.asset_name }} *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true